name: Triggers Workflow

on:
  push:
    branches:
      - master
  issues:
    types: [opened, edited, closed]
  pull_request:
    branches:
      - master

jobs:
  run-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Run Python Application
        run: python app.py
